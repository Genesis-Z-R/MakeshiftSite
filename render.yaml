services:
  - type: web
    name: campus-marketplace
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOADS_PATH
        value: /data/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campus-db
          property: connectionString
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    disk:
      name: campus-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: campus-db
    plan: free
    databaseName: campus_marketplace
    user: campus_user
