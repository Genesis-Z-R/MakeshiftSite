services:
  - type: web
    name: campus-marketplace
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/campus_marketplace.db
      - key: UPLOADS_PATH
        value: /data/uploads
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: campus-data
      mountPath: /data
      sizeGB: 1
